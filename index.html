    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; color: #0f172a; }
        .vcard-minimal { width: 100%; max-width: 420px; background: #ffffff; border: 1px solid #f1f5f9; border-radius: 48px; padding: 44px 28px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); text-align: center; }
        .photo-wrapper { width: 150px; height: 150px; margin: 0 auto 32px; border-radius: 50%; padding: 5px; background: #f1f5f9; border: 1px solid #e2e8f0; overflow: hidden; }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .qr-container { display: flex; justify-content: center; margin-bottom: 2rem; background: #f8fafc; padding: 20px; border-radius: 32px; }
        .qr-container img { border: 8px solid white; border-radius: 16px; width: 160px; height: 160px; }
        
        /* Estilo único para todos los botones azules */
        .btn-azul {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            background: #1e40af;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-azul:hover { background: #1e3a8a; }
    </style>

    <div class="mb-6">

        <!-- Guardar contacto (ya lo tenías) -->

<script>
    // Botón Compartir (nativo o copiar enlace)
    document.getElementById('btnCompartir').addEventListener('click', function() {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({
                title: 'Edgar Flores García - Consultor TI',
                text: 'Tarjeta profesional de Edgar Flores, especialista en ciberseguridad y soporte técnico.',
                url: url
            }).catch(err => console.log('Compartir cancelado o error:', err));
        } else {
            navigator.clipboard.writeText(url).then(() => {
                alert('Enlace copiado al portapapeles. Compártelo donde quieras.');
            }).catch(() => {
                alert('No se pudo copiar el enlace. Comparte manualmente: ' + url);
            });
        }
    });

    // Botón Descargar: captura tu tarjeta original y la centra en un lienzo de 1050x600px (8.9x5.1cm a 300dpi)
    document.getElementById('btnDescargar').addEventListener('click', function() {
        const boton = this;
        const textoOriginal = boton.innerHTML;
        boton.innerHTML = "⏳ Generando imagen tamaño tarjeta...";
        boton.disabled = true;

        const elemento = document.getElementById('tarjetaOriginal');

        // Primero capturamos la tarjeta original a su tamaño actual (aprox 420px de ancho)
        html2canvas(elemento, {
            scale: 2,  // para buena resolución
            backgroundColor: '#f8fafc',
            useCORS: true,
            logging: false
        }).then(canvasOriginal => {
            // Crear un canvas del tamaño exacto de impresión: 1050 x 600 px
            const anchoMeta = 1050;
            const altoMeta = 600;
            const canvasFinal = document.createElement('canvas');
            canvasFinal.width = anchoMeta;
            canvasFinal.height = altoMeta;
            const ctx = canvasFinal.getContext('2d');

            // Rellenar con el mismo color de fondo de tu página
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(0, 0, anchoMeta, altoMeta);

            // Calcular el tamaño y posición para centrar la tarjeta original dentro del lienzo
            const proporcionTarjeta = canvasOriginal.width / canvasOriginal.height;
            const proporcionLienzo = anchoMeta / altoMeta;

            let anchoDibujo, altoDibujo, xOffset, yOffset;

            if (proporcionTarjeta > proporcionLienzo) {
                // La tarjeta es más ancha en proporción: se ajusta al ancho
                anchoDibujo = anchoMeta;
                altoDibujo = anchoMeta / proporcionTarjeta;
                xOffset = 0;
                yOffset = (altoMeta - altoDibujo) / 2;
            } else {
                // La tarjeta es más alta: se ajusta al alto
                altoDibujo = altoMeta;
                anchoDibujo = altoMeta * proporcionTarjeta;
                xOffset = (anchoMeta - anchoDibujo) / 2;
                yOffset = 0;
            }

            // Dibujar la tarjeta centrada
            ctx.drawImage(canvasOriginal, 0, 0, canvasOriginal.width, canvasOriginal.height, xOffset, yOffset, anchoDibujo, altoDibujo);

            // Descargar la imagen
            const enlace = document.createElement('a');
            enlace.download = 'Tarjeta_Edgar_8.9x5.1cm.jpg';
            enlace.href = canvasFinal.toDataURL('image/jpeg', 0.95);
            enlace.click();

            boton.innerHTML = textoOriginal;
            boton.disabled = false;
        }).catch(error => {
            console.error(error);
            boton.innerHTML = "❌ Error, intenta de nuevo";
            boton.disabled = false;
            alert("No se pudo generar la imagen. Recarga la página.");
        });
    });
</script>

</body>
</html>
