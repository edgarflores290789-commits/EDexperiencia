<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edgar Flores García | Consultor TI</title>
    <!-- Metaetiquetas para vista previa en WhatsApp y redes -->
    <meta property="og:title" content="Edgar Flores García | Consultor TI" />
    <meta property="og:description" content="Ingeniero en TI – Ciberseguridad, soporte remoto y mantenimiento de CCTV. Contáctame." />
    <meta property="og:image" content="https://edgarflores290789-commits.github.io/EDexperiencia/fotoperfil.jpeg" />
    <meta property="og:url" content="https://edgarflores290789-commits.github.io/EDexperiencia/" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; color: #0f172a; }
        .vcard-minimal { width: 100%; max-width: 420px; background: #ffffff; border: 1px solid #f1f5f9; border-radius: 48px; padding: 44px 28px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); text-align: center; }
        .photo-wrapper { width: 150px; height: 150px; margin: 0 auto 32px; border-radius: 50%; padding: 5px; background: #f1f5f9; border: 1px solid #e2e8f0; overflow: hidden; }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .qr-container { display: flex; justify-content: center; margin-bottom: 2rem; background: #f8fafc; padding: 20px; border-radius: 32px; }
        .qr-container img { border: 8px solid white; border-radius: 16px; width: 160px; height: 160px; }
    </style>
</head>
<body>
    <div id="tarjetaOriginal" class="vcard-minimal">
        <div class="photo-wrapper">
             <img src="fotoperfil.jpeg" alt="Edgar Flores García" class="w-full h-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=Edgar+Flores&background=2563eb&color=fff'">
        </div>

        <div class="mb-6">
            <span class="bg-blue-50 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Ingeniero TI</span>
            <h1 class="text-3xl font-extrabold text-slate-900 mt-3 mb-1">Edgar Flores García</h1>
            <p class="text-slate-500 text-sm font-medium">Ciberseguridad & Ecosistemas Digitales</p>
        </div>

        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://edgarflores290789-commits.github.io/EDexperiencia/" alt="QR">
        </div>

        <div class="space-y-3">
            <!-- Botón de WhatsApp (reemplaza al de Guardar Contacto) -->
            <a href="https://wa.me/525644326915?text=Hola%20Edgar,%20vi%20tu%20tarjeta%20y%20necesito%20soporte%20técnico" target="_blank" 
               class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl font-bold text-sm bg-slate-900 text-white hover:bg-slate-800 transition">
                <span>📲</span> Contactar por WhatsApp
            </a>

            <!-- Ver Currículum -->
            <a href="Curriculum.html" class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl font-bold text-sm bg-blue-600 text-white">
                <span>📄</span> Ver Currículum Completo
            </a>

            <!-- LinkedIn -->
            <a href="https://www.linkedin.com/in/edgarfloresti" target="_blank" class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl font-bold text-sm border border-slate-200">
                <span>💼</span> LinkedIn Profesional
            </a>

            <!-- Botón Compartir (nuevo) -->
            <button id="btnCompartir" class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl font-bold text-sm border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 transition cursor-pointer">
                🔗 Compartir tarjeta digital
            </button>

            <!-- Botón Descargar tarjeta (8.9x5.1 cm) -->
            <button id="btnDescargarTarjeta" class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl font-bold text-sm bg-green-600 text-white hover:bg-green-700 transition cursor-pointer">
                🖨️ Descargar tarjeta (8.9x5.1 cm)
            </button>
        </div>

        <div class="grid grid-cols-1 gap-2 mt-6">
            <a href="https://www.productos-info.com/tienda/tecnosite-soluciones-especializadas" class="text-[10px] font-bold text-blue-600 uppercase">✨ Soluciones Empresariales</a>
            <a href="https://tecnositesoluciones.com" class="text-[10px] font-bold text-slate-500 uppercase">🌐 Servicios TI</a>
            <a href="https://tienda.tecnositesoluciones.com" class="text-[10px] font-bold text-slate-500 uppercase">🛒 Tienda Online</a>
        </div>
    </div>

    <script>
        // Botón Compartir
        document.getElementById('btnCompartir').addEventListener('click', function() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: 'Edgar Flores García - Consultor TI',
                    text: 'Tarjeta profesional de Edgar Flores, especialista en ciberseguridad y soporte técnico.',
                    url: url
                }).catch(err => console.log('Compartir cancelado:', err));
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('Enlace copiado al portapapeles. Compártelo donde quieras.');
                }).catch(() => {
                    alert('No se pudo copiar el enlace. Comparte manualmente: ' + url);
                });
            }
        });

        // Botón Descargar tarjeta en tamaño 8.9x5.1 cm (con clonación para mantener centrado)
        document.getElementById('btnDescargarTarjeta').addEventListener('click', async function() {
            const boton = this;
            const textoOriginal = boton.innerHTML;
            boton.innerHTML = "⏳ Generando imagen...";
            boton.disabled = true;

            const elementoOriginal = document.getElementById('tarjetaOriginal');
            const anchoFijo = 420;
            const clon = elementoOriginal.cloneNode(true);
            clon.style.width = `${anchoFijo}px`;
            clon.style.maxWidth = `${anchoFijo}px`;
            clon.style.position = 'absolute';
            clon.style.left = '-9999px';
            clon.style.top = '-9999px';
            clon.style.backgroundColor = '#ffffff';
            document.body.appendChild(clon);

            try {
                const canvasClon = await html2canvas(clon, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false
                });
                document.body.removeChild(clon);

                const ANCHO_META = 1050;
                const ALTO_META = 600;
                const canvasFinal = document.createElement('canvas');
                canvasFinal.width = ANCHO_META;
                canvasFinal.height = ALTO_META;
                const ctx = canvasFinal.getContext('2d');
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, 0, ANCHO_META, ALTO_META);

                const anchoCapture = canvasClon.width;
                const altoCapture = canvasClon.height;
                const proporcion = anchoCapture / altoCapture;
                let anchoDibujo, altoDibujo, xOffset, yOffset;
                if (proporcion > (ANCHO_META / ALTO_META)) {
                    anchoDibujo = ANCHO_META;
                    altoDibujo = ANCHO_META / proporcion;
                    xOffset = 0;
                    yOffset = (ALTO_META - altoDibujo) / 2;
                } else {
                    altoDibujo = ALTO_META;
                    anchoDibujo = ALTO_META * proporcion;
                    xOffset = (ANCHO_META - anchoDibujo) / 2;
                    yOffset = 0;
                }
                ctx.drawImage(canvasClon, 0, 0, anchoCapture, altoCapture, xOffset, yOffset, anchoDibujo, altoDibujo);

                const enlace = document.createElement('a');
                enlace.download = 'Tarjeta_Edgar_8.9x5.1cm.jpg';
                enlace.href = canvasFinal.toDataURL('image/jpeg', 0.95);
                enlace.click();
            } catch (error) {
                console.error(error);
                alert("Error al generar la imagen. Recarga la página.");
            } finally {
                boton.innerHTML = textoOriginal;
                boton.disabled = false;
            }
        });
    </script>
</body>
</html>
