            <!-- La magia: instrucción para html2canvas -->
            <script>
            document.getElementById('btn-capturar').addEventListener('click', function() {
            // Selecciona el elemento que quieres capturar (la tarjeta completa)
            const elemento = document.querySelector('.vcard-minimal'); 

            // Configuración para una imagen bonita y nítida
            html2canvas(elemento, {
            scale: 2, // Hace la imagen más nítida
            backgroundColor: '#ffffff', // Fondo blanco limpio
            }).then(canvas => {
            // Convierte el canvas a un enlace de descarga
            const enlace = document.createElement('a');
            enlace.download = 'tarjeta_tecnosite.jpg';
            enlace.href = canvas.toDataURL('image/jpeg', 0.9);
            enlace.click(); // ¡Esto inicia la descarga!
        });
    });
</script>
