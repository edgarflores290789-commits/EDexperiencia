<!-- ========== TARJETA OCULTA (solo para generar la imagen JPG) ========== -->
<style>
    /* Esta tarjeta NO se ve en la página, solo sirve para la captura */
    .tarjeta-para-imagen {
        position: fixed;
        top: -9999px;
        left: -9999px;
        visibility: hidden;
        width: 680px;
        background: white;
        border-radius: 24px;
        box-shadow: none;
        font-family: 'Plus Jakarta Sans', sans-serif;
        overflow: hidden;
        border: 1px solid #e2e8f0;
    }
    .contenido-horizontal {
        display: flex;
        flex-wrap: wrap;
    }
    .info-horizontal {
        flex: 2;
        padding: 28px 20px 28px 28px;
    }
    .qr-horizontal {
        flex: 1;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        border-left: 1px dashed #cbd5e1;
    }
    .qr-horizontal img {
        width: 120px;
        height: 120px;
        border-radius: 16px;
    }
    .qr-texto {
        font-size: 10px;
        color: #475569;
        margin-top: 10px;
        text-align: center;
    }
    .foto-horizontal {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 12px;
    }
    .nombre-horizontal {
        font-size: 20px;
        font-weight: 800;
        color: #0f172a;
    }
    .titulo-horizontal {
        font-size: 12px;
        font-weight: 600;
        color: #2563eb;
        background: #dbeafe;
        display: inline-block;
        padding: 4px 12px;
        border-radius: 30px;
        margin: 10px 0 6px;
    }
    .descripcion-horizontal {
        font-size: 11px;
        color: #334155;
        margin-bottom: 12px;
        line-height: 1.4;
    }
    .contactos-horizontal {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
    }
    .etiqueta-contacto {
        background: #f1f5f9;
        color: #0f172a;
        padding: 4px 10px;
        border-radius: 30px;
        font-size: 10px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
    @media (max-width: 550px) {
        .contenido-horizontal { flex-direction: column; }
        .qr-horizontal { border-left: none; border-top: 1px dashed #cbd5e1; flex-direction: row; gap: 16px; justify-content: center; }
    }
</style>

<div id="tarjetaOculta" class="tarjeta-para-imagen">
    <div class="contenido-horizontal">
        <div class="info-horizontal">
            <img src="fotoperfil.jpeg" alt="Edgar Flores" class="foto-horizontal" onerror="this.src='https://ui-avatars.com/api/?name=Edgar+Flores&background=2563eb&color=fff'">
            <div class="nombre-horizontal">Edgar Flores García</div>
            <div class="titulo-horizontal">Ingeniero en Tecnologías TI</div>
            <div class="descripcion-horizontal">
                Ciberseguridad · Soporte remoto · CCTV · Migraciones de red
            </div>
            <div class="contactos-horizontal">
                <span class="etiqueta-contacto">📞 56 44 32 69 15</span>
                <span class="etiqueta-contacto">✉️ edgar.flores290789@gmail.com</span>
                <span class="etiqueta-contacto">🌐 TecnoSite Soluciones</span>
            </div>
        </div>
        <div class="qr-horizontal">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=https://wa.me/525644326915" alt="QR">
            <div class="qr-texto">
                Escanea para<br>contactar por WhatsApp
            </div>
        </div>
    </div>
</div>

<!-- Botón para descargar la tarjeta física (lo agregas donde quieras, por ejemplo debajo de tus botones actuales) -->
<script>
    // Espera a que la página cargue completamente y agrega el botón automáticamente
    window.addEventListener('DOMContentLoaded', function() {
        // Busca el contenedor de botones de tu tarjeta original
        const contenedorBotones = document.querySelector('.botones'); // Ajusta si tu clase es diferente
        if (contenedorBotones) {
            const nuevoBoton = document.createElement('button');
            nuevoBoton.id = 'btnDescargaFisica';
            nuevoBoton.className = 'boton boton-descarga'; // usa tus clases
            nuevoBoton.style.cssText = 'background:#7c3aed; color:white; margin-top:12px; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border-radius:60px; font-weight:600; border:none; cursor:pointer; width:100%;';
            nuevoBoton.innerHTML = '📸 Descargar tarjeta física (con QR)';
            contenedorBotones.appendChild(nuevoBoton);
            
            // Función para capturar la tarjeta oculta
            nuevoBoton.addEventListener('click', function() {
                const btn = this;
                const textoOriginal = btn.innerHTML;
                btn.innerHTML = '⏳ Generando imagen...';
                btn.disabled = true;
                
                const elemento = document.getElementById('tarjetaOculta');
                setTimeout(() => {
                    html2canvas(elemento, {
                        scale: 2.5,
                        backgroundColor: '#ffffff',
                        useCORS: true,
                        logging: false
                    }).then(canvas => {
                        const enlace = document.createElement('a');
                        enlace.download = 'Tarjeta_TecnoSite_Edgar.jpg';
                        enlace.href = canvas.toDataURL('image/jpeg', 0.95);
                        enlace.click();
                        btn.innerHTML = textoOriginal;
                        btn.disabled = false;
                    }).catch(err => {
                        console.error(err);
                        btn.innerHTML = '❌ Error, intenta de nuevo';
                        btn.disabled = false;
                        alert('No se pudo generar la imagen. Recarga la página.');
                    });
                }, 500);
            });
        } else {
            console.log('No se encontró el contenedor de botones');
        }
    });
</script>
<!-- ========== FIN DE AGREGADO ========== -->
