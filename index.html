<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edgar Flores García | TecnoSite Soluciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 20px;
        }
        /* Tarjeta horizontal con medidas exactas para impresión (1050x600 px) */
        .tarjeta-physica {
            width: 1050px;
            max-width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            transition: transform 0.2s;
        }
        /* Columna izquierda (datos) */
        .col-datos {
            flex: 2;
            padding: 40px 30px;
            background: white;
        }
        /* Columna derecha (QR) */
        .col-qr {
            flex: 1;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-left: 1px solid #e2e8f0;
            text-align: center;
        }
        .foto-perfil {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .nombre {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .badge {
            background: #dbeafe;
            color: #1e40af;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            margin: 10px 0 12px;
        }
        .descripcion {
            font-size: 16px;
            color: #334155;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .botones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        .boton {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            background: #1e40af;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            text-align: center;
        }
        .boton:hover { background: #1e3a8a; }
        .qr-imagen {
            width: 180px;
            height: 180px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .qr-texto {
            font-size: 14px;
            color: #475569;
        }
        .enlaces-pie {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .enlace-pie {
            font-size: 10px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
        }
        /* Responsive: en móvil se apila */
        @media (max-width: 700px) {
            .tarjeta-physica { flex-direction: column; width: 100%; }
            .col-qr { border-left: none; border-top: 1px solid #e2e8f0; flex-direction: row; gap: 20px; justify-content: center; }
            .qr-imagen { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

<div class="tarjeta-physica" id="tarjetaImprimible">
    <div class="col-datos">
        <img src="fotoperfil.jpeg" alt="Edgar Flores" class="foto-perfil" onerror="this.src='https://ui-avatars.com/api/?name=Edgar+Flores&background=2563eb&color=fff'">
        <div class="nombre">Edgar Flores García</div>
        <div class="badge">Ingeniero en Tecnologías TI</div>
        <div class="descripcion">
            Ciberseguridad · Soporte remoto · CCTV · Migraciones de red
        </div>
        <div class="botones">
            <!-- WhatsApp -->
            <a href="https://wa.me/525644326915?text=Hola%20Edgar,%20necesito%20soporte%20técnico" target="_blank" class="boton">
                📲 Contactar por WhatsApp
            </a>
            <!-- Guardar contacto VCF -->
            <a href="data:text/vcard;charset=utf-8,BEGIN:VCARD%0AVERSION:3.0%0AN:Flores García;Edgar;;;%0AFN:Edgar Flores García%0AORG:TecnoSite Soluciones%0ATEL;TYPE=CELL:5644326915%0AEMAIL:edgar.flores290789@gmail.com%0AURL:https://www.productos-info.com/tienda/tecnosite-soluciones-especializadas%0AEND:VCARD" download="Contacto_Edgar_Flores.vcf" class="boton">
                💾 Guardar contacto (vCard)
            </a>
            <!-- Currículum -->
            <a href="Curriculum.html" class="boton">
                📄 Ver currículum completo
            </a>
            <!-- LinkedIn -->
            <a href="https://www.linkedin.com/in/edgarfloresti" target="_blank" class="boton">
                💼 LinkedIn
            </a>
            <!-- Botón Compartir (usa API nativa) -->
            <button id="btnCompartir" class="boton">
                🔗 Compartir esta tarjeta
            </button>
            <!-- Botón Descargar para imprimir en 8.9x5.1 cm -->
            <button id="btnImprimir" class="boton">
                🖨️ Descargar tarjeta para imprimir (8.9x5.1 cm)
            </button>
        </div>
        <div class="enlaces-pie">
            <a href="https://www.productos-info.com/tienda/tecnosite-soluciones-especializadas" class="enlace-pie" style="color:#1e40af;">✨ Soluciones Empresariales</a>
            <a href="https://tecnositesoluciones.com" class="enlace-pie" style="color:#2563eb;">🌐 Servicios TI</a>
            <a href="https://tienda.tecnositesoluciones.com" class="enlace-pie" style="color:#3b82f6;">🛒 Tienda Online</a>
        </div>
    </div>
    <div class="col-qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://edgarflores290789-commits.github.io/EDexperiencia/" alt="QR" class="qr-imagen">
        <div class="qr-texto">Escanea para ver mi perfil profesional</div>
    </div>
</div>

<script>
    // Botón COMPARTIR
    const btnCompartir = document.getElementById('btnCompartir');
    btnCompartir.addEventListener('click', () => {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({
                title: 'Edgar Flores García | Consultor TI',
                text: 'Tarjeta digital - Ciberseguridad y soporte técnico',
                url: url
            }).catch(err => console.log('Cancelado o error:', err));
        } else {
            navigator.clipboard.writeText(url).then(() => {
                alert('Enlace copiado al portapapeles. Compártelo donde quieras.');
            }).catch(() => {
                alert('No se pudo copiar el enlace. Comparte manualmente: ' + url);
            });
        }
    });

    // Botón IMPRIMIR (descarga JPG exactamente del tamaño físico)
    const btnImprimir = document.getElementById('btnImprimir');
    btnImprimir.addEventListener('click', function() {
        const boton = this;
        const textoOriginal = boton.innerHTML;
        boton.innerHTML = "⏳ Generando imagen tamaño real...";
        boton.disabled = true;
        const elemento = document.getElementById('tarjetaImprimible');
        
        html2canvas(elemento, {
            scale: 1,          // ya tiene tamaño 1050px de ancho (exacto)
            backgroundColor: '#ffffff',
            useCORS: true,
            logging: false
        }).then(canvas => {
            const enlace = document.createElement('a');
            enlace.download = 'Tarjeta_Edgar_8.9x5.1cm.jpg';
            enlace.href = canvas.toDataURL('image/jpeg', 0.95);
            enlace.click();
            boton.innerHTML = textoOriginal;
            boton.disabled = false;
        }).catch(error => {
            console.error(error);
            boton.innerHTML = "❌ Error, recarga la página";
            boton.disabled = false;
            alert("No se pudo generar la imagen. Recarga la página e intenta de nuevo.");
        });
    });
</script>

</body>
</html>
